<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        margin: 0;
        padding: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #f8f9fa;
        color: #212529;
      }
      .box {
        max-width: 520px;
        text-align: center;
      }
      a {
        color: #0d6efd;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .small {
        font-size: 0.875rem;
        color: #6c757d;
      }
    </style>
    <script>
      (function () {
        var path = window.location.pathname || "/";
        var normalized = path.replace(/\/+$/, "");
        var lower = normalized.toLowerCase();

        // 대소문자와 상관없이 특정 프로젝트 경로를 정규화
        var canonicalPaths = ["/KRISS_AI_Study", "/UST_Lecture_AgenticAI"];

        for (var i = 0; i < canonicalPaths.length; i++) {
          var canonical = canonicalPaths[i];
          var canonicalLower = canonical.toLowerCase();
          if (lower === canonicalLower) {
            if (normalized !== canonical) {
              window.location.replace(canonical + "/");
              return;
            }
          }
        }

        // 위에 해당하지 않으면 메인 SPA로 보내기
        window.location.replace("/");
      })();
    </script>
  </head>
  <body>
    <div class="box">
      <h1>페이지를 찾을 수 없습니다</h1>
      <p class="small">
        잘못된 주소로 접근하셨을 수 있습니다. 잠시 후
        <a href="/">메인 페이지</a> 또는 관련 프로젝트 페이지로 이동합니다.
      </p>
    </div>
  </body>
</html>
